name: Build & Security

# Required repository secrets:
#   SONAR_TOKEN         - SonarCloud/SonarQube token
#   SONAR_HOST_URL      - SonarCloud/SonarQube host URL (e.g. https://sonarcloud.io)
#   SONAR_ORGANIZATION  - SonarCloud organization key
#
# Optional but recommended:
#   GITHUB_TOKEN        - automatically provided; used for ghcr.io push and SARIF upload
#
# This is an intentionally vulnerable learning lab, so:
#   - Gitleaks is run with --exit-code 0 (findings are reported, not failed on)
#   - SonarQube and Trivy use continue-on-error: true (findings are informational, not gating)

on:
  push:
    branches: [main, master, feature-**]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Default permissions are tightest. Each job overrides what it needs.
permissions:
  contents: read

# Shared env (e.g. SONAR_HOST_URL) is read by jobs that need it.
env:
  SONAR_HOST_URL: https://sonarcloud.io
  SONAR_PROJECT_KEY: hariom6123_vulnerable-springboot-app
  SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
  

jobs:
  # ---------------------------------------------------------------
  # 1. COVERAGE BUILD
  # ---------------------------------------------------------------
  build-and-coverage:
    name: Build, test, and aggregate coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build, test, and aggregate coverage
        if: always()
        run: mvn -B -ntp -Pcoverage verify

      - name: Upload coverage build artifact
        if: always() && hashFiles('target/site/jacoco/jacoco.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-build-output
          path: target/
          if-no-files-found: ignore
          retention-days: 90

  # ---------------------------------------------------------------
  # 2. UNIT TESTS
  # ---------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [build-and-coverage]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Upload Surefire reports
        if: always() && hashFiles('target/surefire-reports/*.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 90

  # ---------------------------------------------------------------
  # 3. SONARQUBE CLOUD STATIC ANALYSIS
  # ---------------------------------------------------------------
  sonarqube:
    name: SonarQube Cloud analysis
    runs-on: ubuntu-latest
    needs: [unit-tests]
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build, test, and aggregate coverage
        if: always()
        run: mvn -B -ntp -Pcoverage verify

      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify sonar:sonar \
          -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }} \
          -Dsonar.organization=${{ env.SONAR_ORGANIZATION }} \
          -Dsonar.host.url=${{ env.SONAR_HOST_URL }} \
          -Dsonar.token=${SONAR_TOKEN} \
          -Dsonar.sources=src/main/java \


      - name: Download SonarQube Reports
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ env.SONAR_PROJECT_KEY }}
        run: |
          mkdir -p sonar-report

          echo "Downloading Quality Gate..."
          curl -s -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=${SONAR_PROJECT_KEY}" \
            -o sonar-report/quality-gate.json

          echo "Downloading Issues..."
          curl -s -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/issues/search?componentKeys=${SONAR_PROJECT_KEY}&ps=500" \
            -o sonar-report/issues.json

          echo "Downloading Measures..."
          curl -s -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/measures/component?component=${SONAR_PROJECT_KEY}&metricKeys=bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density,ncloc,reliability_rating,security_rating,sqale_rating" \
            -o sonar-report/measures.json

          echo "Downloading Hotspots..."
          curl -s -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/hotspots/search?projectKey=${SONAR_PROJECT_KEY}" \
            -o sonar-report/hotspots.json

          echo "Downloading Project Metadata..."
          curl -s -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/components/show?component=${SONAR_PROJECT_KEY}" \
            -o sonar-report/project.json

          cat <<EOF > sonar-report/report-metadata.json
          {
            "project":"${SONAR_PROJECT_KEY}",
            "repository":"${GITHUB_REPOSITORY}",
            "branch":"${GITHUB_REF_NAME}",
            "commit":"${GITHUB_SHA}",
            "generated":"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

          echo "Generated reports:"
          ls -lah sonar-report

          echo "Issues Count:"
          jq '.paging.total' sonar-report/issues.json || true

      - name: Upload SonarQube Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: sonar-report/
          retention-days: 90    
  
  
