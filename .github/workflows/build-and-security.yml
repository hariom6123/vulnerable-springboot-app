name: Build & Security

# Required repository secrets:
#   NVDAI_API_KEY       - API key for the vulnerability-scanner Claude agent
#                          (mapped to ANTHROPIC_API_KEY in the runner env)
#   SONAR_TOKEN         - SonarCloud token (https://sonarcloud.io/account/security)
#   SONAR_HOST_URL      - SonarCloud/SonarQube host URL (e.g. https://sonarcloud.io)
#   SONAR_ORGANIZATION  - SonarCloud organization key
#
# Optional but recommended:
#   GITHUB_TOKEN        - automatically provided; used by Gitleaks and the SARIF upload
#
# This is an intentionally vulnerable learning lab, so:
#   - Gitleaks is run with --exit-code 0 (findings are reported, not failed on)
#   - SonarQube uses continue-on-error: true (Quality Gate warnings don't gate the run)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pull-requests: read

jobs:
  build:
    name: Build (Maven)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build & test (skip tests on this intentionally insecure lab)
        run: mvn -B -ntp -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          if-no-files-found: ignore
          retention-days: 7

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Secret scanning on every push ----
      # Run gitleaks as a CLI step (not via gitleaks-action) so we can pass
      # --exit-code 0 — this lab intentionally contains hardcoded secrets, so
      # we want to REPORT findings, not fail the job on them.
      - name: Gitleaks secret scan
        run: |
          # Install gitleaks if not already present
          if ! command -v gitleaks >/dev/null 2>&1; then
            echo "Installing gitleaks..."
            GITLEAKS_VERSION="8.18.4"
            curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar -xz -C /usr/local/bin gitleaks
          fi
          gitleaks detect --no-git --redact --exit-code 0 --report-path gitleaks-report.json || true
          if [ -f gitleaks-report.json ]; then
            echo "::group::Gitleaks findings"
            cat gitleaks-report.json
            echo "::endgroup::"
          fi

      - name: Upload Gitleaks report
        if: always() && hashFiles('gitleaks-report.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn
          retention-days: 90

      # ---- Vulnerability-scanner agent ----
      # Runs the Claude Code CLI against .claude/agents/vulnerability-scanner.md
      # and writes SECURITY_ASSESSMENT_REPORT.md at the repo root.
      # The NVDAI_API_KEY repository secret is mapped to ANTHROPIC_API_KEY, which
      # is the env var the Claude Code CLI reads for authentication.
      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run vulnerability-scanner agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.NVDAI_API_KEY }}
        run: |
          mkdir -p .claude/reports
          claude \
            --agent vulnerability-scanner \
            --print \
            --output-format text \
            "Run a full security assessment of this repository using .claude/agents/vulnerability-scanner.md. Write SECURITY_ASSESSMENT_REPORT.md to .claude/reports/."

      - name: Upload vulnerability-scanner report
        if: always() && hashFiles('.claude/reports/SECURITY_ASSESSMENT_REPORT.md') != ''
        uses: actions/upload-artifact@v4
        with:
          name: security-assessment-report
          path: .claude/reports/SECURITY_ASSESSMENT_REPORT.md
          retention-days: 90

      # Also publish the report back to the repo so it shows up on the main branch
      # on the next push trigger (commit only if the file actually changed).
      # Only commit on direct pushes to main/master — skip on PRs (no write access
      # on fork PRs) and on feature branches (avoids races with the trigger push).
      - name: Commit report back to branch
        if: |
          always() &&
          hashFiles('.claude/reports/SECURITY_ASSESSMENT_REPORT.md') != '' &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git add .claude/reports/SECURITY_ASSESSMENT_REPORT.md
          if git diff --cached --quiet; then
            echo "No changes to report."
          else
            git commit -m "chore(security): refresh SECURITY_ASSESSMENT_REPORT.md"
            git push
          fi

  # ---------------------------------------------------------------
  # 3. SONARQUBE CLOUD STATIC ANALYSIS
  # ---------------------------------------------------------------
  # Runs after build (needs the compiled bytecode). This lab is intentionally
  # vulnerable, so the scanner step is marked continue-on-error: a failed
  # Quality Gate is informational, not a workflow failure.
  #
  # Required project-level config (in sonar-project.properties or pom.xml):
  #   sonar.projectKey=vulnerable-spring-app
  #   sonar.organization=<your org key>
  #   sonar.host.url=<from secrets.SONAR_HOST_URL, e.g. https://sonarcloud.io>
  #   sonar.token=<from secrets.SONAR_TOKEN>
  #   sonar.sources=src/main/java
  #   sonar.tests=src/test/java
  #   sonar.java.binaries=target/classes
  #   sonar.java.coveragePlugin=jacoco
  #   sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
  #   sonar.junit.reportPaths=target/surefire-reports
  sonarqube:
    name: SonarQube Cloud analysis
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarQube needs full git history for blame/assignee info
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Build with tests + JaCoCo coverage so SonarQube has metrics to import.
      # We run verify (not just test) so JaCoCo's prepare-agent + report-aggregate
      # both run. This is independent of the build job, which uses -DskipTests.
      - name: Build, test, and aggregate coverage
        if: always()
        run: mvn -B -ntp -Pcoverage verify

      - name: SonarQube scan
        if: always() && env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        continue-on-error: true
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=vulnerable-spring-app
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.java.binaries=target/classes
            -Dsonar.java.coveragePlugin=jacoco
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.junit.reportPaths=target/surefire-reports

      - name: Post SonarQube dashboard link to run summary
        if: always() && env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        run: |
          echo "## SonarQube Cloud analysis" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "View the Quality Gate result and findings on SonarCloud:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "${SONAR_HOST_URL}/dashboard?id=vulnerable-spring-app" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Note: this is an intentionally vulnerable learning lab, so the Quality" >> "$GITHUB_STEP_SUMMARY"
          echo "Gate is expected to fail. The job is marked continue-on-error so a" >> "$GITHUB_STEP_SUMMARY"
          echo "failed Quality Gate does not fail the workflow." >> "$GITHUB_STEP_SUMMARY"

      - name: Skip notice when Sonar secrets are missing
        if: env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == ''
        run: |
          echo "::warning::SonarQube scan skipped — configure SONAR_TOKEN, SONAR_HOST_URL, and SONAR_ORGANIZATION repository secrets to enable this job."