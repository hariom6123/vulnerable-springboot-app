name: Build & Security

# Required repository secrets:
#   SONAR_TOKEN         - SonarCloud/SonarQube token
#   SONAR_HOST_URL      - SonarCloud/SonarQube host URL (e.g. https://sonarcloud.io)
#   SONAR_ORGANIZATION  - SonarCloud organization key
#
# Optional but recommended:
#   GITHUB_TOKEN        - automatically provided; used for ghcr.io push and SARIF upload
#
# This is an intentionally vulnerable learning lab, so:
#   - Gitleaks is run with --exit-code 0 (findings are reported, not failed on)
#   - SonarQube and Trivy use continue-on-error: true (findings are informational, not gating)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Default permissions are tightest. Each job overrides what it needs.
permissions:
  contents: read

# Shared env (e.g. SONAR_HOST_URL) is read by jobs that need it.
env:
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

jobs:
  # ---------------------------------------------------------------
  # 1. UNIT TESTS
  # ---------------------------------------------------------------
  # Currently a no-op (the repo has no src/test/java tree), but wired in
  # so future test additions are picked up automatically.
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Upload Surefire reports
        if: always() && hashFiles('target/surefire-reports/*.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 90

  # ---------------------------------------------------------------
  # 2. SONARQUBE CLOUD STATIC ANALYSIS
  # ---------------------------------------------------------------
  # Builds with `-Pcoverage` (JaCoCo profile defined in pom.xml) so Sonar
  # has a jacoco.xml report to import. Continue-on-error swallows the
  # expected Quality Gate failure on this intentionally insecure lab.
  sonarqube:
    name: SonarQube Cloud analysis
    runs-on: ubuntu-latest
    needs: [unit-tests]
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarQube needs full git history for blame/assignee info
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build, test, and aggregate coverage
        if: always()
        run: mvn -B -ntp -Pcoverage verify

      - name: SonarQube scan
        if: always()
        continue-on-error: true
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=vulnerable-spring-app
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.java.binaries=target/classes
            -Dsonar.java.coveragePlugin=jacoco
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.junit.reportPaths=target/surefire-reports

      - name: Post SonarQube dashboard link to run summary
        if: always() && env.SONAR_HOST_URL != ''
        run: |
          echo "## SonarQube Cloud analysis" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "View the Quality Gate result and findings on SonarCloud:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "${SONAR_HOST_URL}/dashboard?id=vulnerable-spring-app" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Note: this is an intentionally vulnerable learning lab, so the Quality" >> "$GITHUB_STEP_SUMMARY"
          echo "Gate is expected to fail. The job is marked continue-on-error so a" >> "$GITHUB_STEP_SUMMARY"
          echo "failed Quality Gate does not fail the workflow." >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------
  # 3. TRIVY FILESYSTEM SCAN
  # ---------------------------------------------------------------
  # Scans the working tree for known-vulnerable dependencies and config.
  # Findings are SARIF-uploaded to the Security tab; the step is
  # continue-on-error because this lab is intentionally vulnerable.
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    needs: [sonarqube]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          continue-on-error: true

      - name: Upload Trivy filesystem SARIF
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs.sarif
          if-no-files-found: warn
          retention-days: 90

      - name: Upload Trivy filesystem SARIF to Security tab
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ---------------------------------------------------------------
  # 4. DOCKER IMAGE BUILD
  # ---------------------------------------------------------------
  # Builds the multi-stage Dockerfile and loads the image into the
  # runner's local Docker daemon. The image is not pushed here — the
  # publish job below handles the ghcr.io push after Trivy has scanned it.
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [trivy-fs]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load to local daemon)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: vulnerable-spring-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

  # ---------------------------------------------------------------
  # 5. TRIVY IMAGE SCAN
  # ---------------------------------------------------------------
  # Scans the locally-built image for OS- and library-level CVEs.
  # Findings are SARIF-uploaded to the Security tab.
  trivy-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Run Trivy image scan (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'vulnerable-spring-app:ci'
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          continue-on-error: true

      - name: Upload Trivy image SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image.sarif
          if-no-files-found: warn
          retention-days: 90

      - name: Upload Trivy image SARIF to Security tab
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ---------------------------------------------------------------
  # 6. PUBLISH
  # ---------------------------------------------------------------
  # Gates on every previous job. Re-runs mvn package locally (fast, ~30s)
  # to publish the runnable JAR as a workflow artifact, and pushes the
  # Docker image to ghcr.io tagged with the commit SHA and `latest`.
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [trivy-image]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build runnable JAR
        run: mvn -B -ntp -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          if-no-files-found: ignore
          retention-days: 7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to ghcr.io
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          load: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/vulnerable-spring-app:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/vulnerable-spring-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

  # ---------------------------------------------------------------
  # 7. GITLEAKS SECRET SCAN
  # ---------------------------------------------------------------
  # Runs in parallel with the rest. Uses --exit-code 0 so findings are
  # reported (this lab intentionally contains hardcoded secrets) but the
  # workflow does not fail on them.
  security:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks secret scan
        run: |
          # Install gitleaks if not already present
          if ! command -v gitleaks >/dev/null 2>&1; then
            echo "Installing gitleaks..."
            GITLEAKS_VERSION="8.18.4"
            curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar -xz -C /usr/local/bin gitleaks
          fi
          gitleaks detect --no-git --redact --exit-code 0 --report-path gitleaks-report.json || true
          if [ -f gitleaks-report.json ]; then
            echo "::group::Gitleaks findings"
            cat gitleaks-report.json
            echo "::endgroup::"
          fi

      - name: Upload Gitleaks report
        if: always() && hashFiles('gitleaks-report.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn
          retention-days: 90
