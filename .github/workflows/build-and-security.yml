name: Build & Security

# Required repository secrets:
#   SONAR_TOKEN         - SonarCloud/SonarQube token
#   SONAR_HOST_URL      - SonarCloud/SonarQube host URL (e.g. https://sonarcloud.io)
#   SONAR_ORGANIZATION  - SonarCloud organization key
#
# Optional but recommended:
#   GITHUB_TOKEN        - automatically provided; used for ghcr.io push and SARIF upload
#
# This is an intentionally vulnerable learning lab, so:
#   - Gitleaks is run with --exit-code 0 (findings are reported, not failed on)
#   - SonarQube and Trivy use continue-on-error: true (findings are informational, not gating)

on:
  push:
    branches: [main, master, feature-**]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Default permissions are tightest. Each job overrides what it needs.
permissions:
  contents: read

# Shared env (e.g. SONAR_HOST_URL) is read by jobs that need it.

  

jobs:
  # ---------------------------------------------------------------
  # 1. COVERAGE BUILD
  # ---------------------------------------------------------------
  build-and-coverage:
    name: Build, test, and aggregate coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build, test, and aggregate coverage
        if: always()
        run: mvn -B -ntp -Pcoverage verify

      - name: Upload coverage build artifact
        if: always() && hashFiles('target/site/jacoco/jacoco.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-build-output
          path: target/
          if-no-files-found: ignore
          retention-days: 90

  # ---------------------------------------------------------------
  # 2. UNIT TESTS
  # ---------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [build-and-coverage]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Upload Surefire reports
        if: always() && hashFiles('target/surefire-reports/*.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 90

  # ---------------------------------------------------------------
  # 3. SONARQUBE CLOUD STATIC ANALYSIS
  # ---------------------------------------------------------------

  sonarqube:
    name: Sonarqube Cloud Analysis
    needs: build-and-coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Cache SonarQube packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=hariom6123_vulnerable-springboot-app

      - name: Download SonarQube Issues
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=hariom6123_vulnerable-springboot-app&s=FILE_LINE&asc=false&resolved=false" \
            > sonar-issues.json
          
          echo "=== SonarQube Issues Found ==="
          cat sonar-issues.json | jq '.' || echo "No issues or API call failed"

      - name: Generate Human-Readable Reports
        if: always()
        run: python3 scripts/generate_sonar_report.py

      - name: Upload SonarQube Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-reports
          path: |
            sonar-issues.json
            sonar-report.html
            sonar-report.md
          retention-days: 90
          
  
  # ---------------------------------------------------------------
  # 4. TRIVY FILESYSTEM SCAN
  # ---------------------------------------------------------------
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    needs: [sonarqube]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          continue-on-error: true

      - name: Upload Trivy filesystem SARIF
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs.sarif
          if-no-files-found: warn
          retention-days: 90

      - name: Upload Trivy filesystem SARIF to Security tab
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ---------------------------------------------------------------
  # 5. GITLEAKS SECRET SCAN
  # ---------------------------------------------------------------
  security:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    needs: [trivy-fs]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks secret scan
        run: |
          if ! command -v gitleaks >/dev/null 2>&1; then
            echo "Installing gitleaks..."
            GITLEAKS_VERSION="8.18.4"
            curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar -xz -C /usr/local/bin gitleaks
          fi
          gitleaks detect --no-git --redact --exit-code 0 --report-path gitleaks-report.json || true
          if [ -f gitleaks-report.json ]; then
            echo "::group::Gitleaks findings"
            cat gitleaks-report.json
            echo "::endgroup::"
          fi
      - name: Upload Gitleaks report
        if: always() && hashFiles('gitleaks-report.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn
          retention-days: 90

  # ---------------------------------------------------------------
  # 6. DOCKER IMAGE BUILD
  # ---------------------------------------------------------------
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [security]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load to local daemon)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: vulnerable-spring-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
      - name: Save Docker image
        run: docker save vulnerable-spring-app:ci | gzip > image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  # ---------------------------------------------------------------
  # 7. TRIVY IMAGE SCAN
  # ---------------------------------------------------------------
  trivy-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: gunzip -c image.tar.gz | docker load

      - name: Run Trivy image scan (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'vulnerable-spring-app:ci'
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          continue-on-error: true

      - name: Upload Trivy image SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image.sarif
          if-no-files-found: warn
          retention-days: 90

      - name: Upload Trivy image SARIF to Security tab
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ---------------------------------------------------------------
  # 8. PUBLISH
  # ---------------------------------------------------------------
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [trivy-image]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build runnable JAR
        run: mvn -B -ntp -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          if-no-files-found: ignore
          retention-days: 7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to ghcr.io
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          load: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/vulnerable-spring-app:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/vulnerable-spring-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

  # ---------------------------------------------------------------
  # 9. AUTO-REMEDIATE (Claude agent)
  # ---------------------------------------------------------------
  # Runs the sonar-trivy-remediator agent against the merged Trivy fs
  # + image SARIF reports (and the SonarQube generic-issue JSON, when
  # SONAR_TOKEN is present). The agent only modifies files in the
  # working tree; nothing is pushed or committed by this job.
  auto-remediate:
    name: Sonar-Trivy auto-remediate
    runs-on: ubuntu-latest
    needs: [trivy-fs, trivy-image]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Download Trivy filesystem SARIF
        uses: actions/download-artifact@v4
        with:
          name: trivy-fs-report
          path: reports/
          if-no-files-found: warn
          retention-days: 90

      - name: Download Trivy image SARIF
        uses: actions/download-artifact@v4
        with:
          name: trivy-image-report
          path: reports/
          if-no-files-found: warn
          retention-days: 90

      - name: Normalize Trivy SARIF filenames
        run: |
          set -e
          # The artifacts are downloaded to reports/<artifactName>/, but the
          # agent expects them flat under reports/. Flatten if needed.
          if [ -f reports/trivy-fs-report/trivy-fs.sarif ] && [ ! -f reports/trivy-fs.sarif ]; then
            cp reports/trivy-fs-report/trivy-fs.sarif reports/trivy-fs.sarif
          fi
          if [ -f reports/trivy-image-report/trivy-image.sarif ] && [ ! -f reports/trivy-image.sarif ]; then
            cp reports/trivy-image-report/trivy-image.sarif reports/trivy-image.sarif
          fi
          ls -la reports/ || true

      - name: Fetch SonarQube issues JSON
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ env.SONAR_PROJECT_KEY }}
        run: |
          set -e
          curl -fsSL -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/issues/search?projectKeys=${SONAR_PROJECT_KEY}&types=VULNERABILITY,CODE_SMELL,BUG,SECURITY_HOTSPOT&ps=500&p=1" \
            -o reports/sonar-report.json || \
            echo "::warning::Failed to fetch SonarQube report; agent will proceed without it."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run auto-remediation agent
        env:
          NVDAI_API_KEY: ${{ secrets.nvdai_api_key }}
        run: bash scripts/run-agent.sh

      - name: Upload auto-remediation report
        if: always() && hashFiles('reports/auto-remediation-report.md') != ''
        uses: actions/upload-artifact@v4
        with:
          name: auto-remediation-report
          path: reports/auto-remediation-report.md
          if-no-files-found: warn
          retention-days: 90

      - name: Upload working-tree patch
        if: always()
        run: |
          git diff --stat > reports/git-diff-stat.txt || true
          git diff       > reports/git-diff.patch       || true
        shell: bash

      - name: Upload patch artifact
        if: always() && hashFiles('reports/git-diff.patch') != ''
        uses: actions/upload-artifact@v4
        with:
          name: auto-remediation-patch
          path: reports/git-diff.patch
          if-no-files-found: warn
          retention-days: 90

